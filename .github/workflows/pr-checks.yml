name: PR Checks

on:
  pull_request:
    branches: [main, master]

jobs:
  # Быстрая проверка кода без Docker
  code-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: make lint
        continue-on-error: false

      - name: Run type check
        run: make type-check
        continue-on-error: false

  # Проверка что Docker собирается
  docker-build-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-pr-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-docker-pr-

      - name: Build Docker images
        run: |
          docker compose -f .devcontainer/compose.yaml build
        continue-on-error: false

      - name: Test Docker compose config
        run: |
          docker compose -f .devcontainer/compose.yaml config
