name: hexlet

services:
  devcontainer:
    user: node
    env_file:
      - ../config/env/.env
    build:
      context: .
      target: devcontainer
    volumes:
      - ..:/workspace
      - devcontainer:/home/node/.claude
    tty: true
    stdin_open: true
    working_dir: /workspace
    command: bash

volumes:
  devcontainer:
